name: Deploy Nangkiew Foundation Insights

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build website
        working-directory: ./nangkiew-foundation-insights
        env:
          SITE_URL: https://kkkri.github.io/nangkiew-foundation-insights
        run: npm run build

      - name: Upload website
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./nangkiew-foundation-insights/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
